name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release (e.g. 1.2.3)'
        required: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/_build.yml
    with:
      build_type: Release
      upload: true
      artifact_prefix: release

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts/

      - name: Zip per-matrix-entry directories
        run: |
          set -euo pipefail
          cd artifacts
          for d in release-*/; do
            d="${d%/}"
            base="${d%-Release}"
            (cd "$d" && zip -r "../${base}.zip" .)
          done
          ls -la
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.tag }}
          name: Release v${{ github.event.inputs.tag }}
          body: |
            Multi-region release for version v${{ github.event.inputs.tag }}
          files: artifacts/release-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
